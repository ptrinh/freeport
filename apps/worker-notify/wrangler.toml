name = "freeport-notify"
main = "src/index.ts"
compatibility_date = "2026-01-01"

# KV namespace holding push subscriptions (sub:<pubkey> -> PushSub[]).
# Create with:  npx wrangler kv namespace create SUBS
# then paste the returned id below.
[[kv_namespaces]]
binding = "SUBS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Lock CORS to the app origin (or "*" to allow any).
ALLOW_ORIGIN = "https://freeport-dj7.pages.dev"

# ADMIN_TOKEN is a SECRET, not a var — set it with:
#   npx wrangler secret put ADMIN_TOKEN
