plugins {
  id 'com.android.library'
  id 'kotlin-android'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.cloudbackup'
version = '1.0.0'

android {
  namespace "expo.modules.cloudbackup"
  defaultConfig {
    versionCode 1
    versionName '1.0.0'
  }
}

dependencies {
  implementation 'com.google.android.gms:play-services-auth-blockstore:16.4.0'
}
