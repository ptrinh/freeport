name: Desktop

# Build the Tauri desktop app for macOS / Windows / Linux.
#  - workflow_dispatch: build all three and upload artifacts (validation).
#  - push a tag `desktop-v*`: build + attach installers to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ['desktop-v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
            triple: aarch64-apple-darwin
            bun_target: bun-darwin-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
            triple: x86_64-apple-darwin
            bun_target: bun-darwin-x64
          - platform: ubuntu-22.04
            args: ''
            rust_target: x86_64-unknown-linux-gnu
            triple: x86_64-unknown-linux-gnu
            bun_target: bun-linux-x64
          # Linux arm64 (.deb). No Windows arm64: Bun can't compile the sidecar
          # for windows-arm64; Windows-on-ARM runs the x64 build via emulation.
          - platform: ubuntu-24.04-arm
            args: ''
            rust_target: aarch64-unknown-linux-gnu
            triple: aarch64-unknown-linux-gnu
            bun_target: bun-linux-arm64
          - platform: windows-latest
            args: ''
            rust_target: x86_64-pc-windows-msvc
            triple: x86_64-pc-windows-msvc
            bun_target: bun-windows-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Linux system deps
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev libxdo-dev libssl-dev build-essential file

      - name: Install deps + build workspace packages
        # --ignore-scripts on the mobile install: the Breez react-native
        # package's postinstall is a shell script Windows npm can't spawn
        # (cmd.exe: "'.' is not recognized"), and its codegen only matters
        # for native iOS/Android builds. Our own postinstall
        # (copy-breez-wasm.mjs: wasm → public/, glue patches) DOES matter for
        # the web bundle, so run it explicitly on every platform.
        run: |
          npm ci
          npm ci --prefix apps/mobile --ignore-scripts
          node apps/mobile/scripts/copy-breez-wasm.mjs
          npm run build        # compile @freeport/protocol + agent → dist (expo export needs them)
          npm --prefix apps/desktop install

      - name: Install Bun (for the notifier sidecar)
        uses: oven-sh/setup-bun@v2

      - name: Build notification-server sidecar
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          EXT=""; [ "${{ matrix.platform }}" = "windows-latest" ] && EXT=".exe"
          bun build packages/freeport-self-hosted/src/http.ts --compile --target=${{ matrix.bun_target }} \
            --outfile "apps/desktop/src-tauri/binaries/freeport-notifier-${{ matrix.triple }}$EXT"

      - name: Generate app icons
        working-directory: apps/desktop
        run: npx @tauri-apps/cli icon ../mobile/assets/icon.png

      - name: Build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Built-in wallet (Breez Spark) — embeddable distribution key; without
          # it the desktop web bundle ships wallet-less (NWC only).
          EXPO_PUBLIC_BREEZ_API_KEY: ${{ secrets.EXPO_PUBLIC_BREEZ_API_KEY }}
          # Minisign key for tauri-plugin-updater artifacts (.tar.gz.sig etc.).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS codesign + notarization (Developer ID). tauri-action signs and
          # notarizes automatically when these are set; skipped while unset.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          # Only create a release when triggered by a desktop-v* tag.
          tagName: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && github.ref_name || '' }}
          # __VERSION__ is substituted by tauri-action with the app version.
          releaseName: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && 'Freeport Desktop v__VERSION__' || '' }}
          releaseBody: |
            ## Which file do I download?

            | Your computer | Download |
            |---|---|
            | **macOS** — Apple Silicon (M1 or newer) | `Freeport_…_aarch64.dmg` |
            | **macOS** — Intel | `Freeport_…_x64.dmg` |
            | **Windows** 10/11 (x64; also runs on Windows-on-ARM) | `Freeport_…_x64-setup.exe` (or the `.msi`) |
            | **Linux** — x64, Debian/Ubuntu | `Freeport_…_amd64.deb` |
            | **Linux** — arm64 (Raspberry Pi 4+, ARM servers) | `Freeport_…_arm64.deb` |
            | **Any browser, no install** — single-file offline copy | `Freeport_…-offline.html` |

            The `.sig`, `.app.tar.gz`, and `latest.json` files are used by the app's built-in auto-updater — you can ignore them.

            macOS builds are signed and notarized. The app includes a headless server mode (`--serve`) — see the [README](https://github.com/ptrinh/freeport#desktop-app-cli-headless-host).
          # Published immediately: the in-app updater polls
          # releases/latest/download/latest.json, which only resolves for a
          # published release.
          releaseDraft: false
          includeUpdaterJson: true

      - name: Attach single-file offline app to the release
        # One leg only; the web bundle is platform-independent. Browsers can't
        # "Save page as" a working copy (Chrome skips webfonts → no icons), so
        # every release ships a fully self-contained HTML that runs from file://.
        if: startsWith(github.ref, 'refs/tags/desktop-v') && matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPO_PUBLIC_BREEZ_API_KEY: ${{ secrets.EXPO_PUBLIC_BREEZ_API_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          node apps/mobile/scripts/build-offline.mjs apps/desktop/dist "Freeport_${VERSION}-offline.html"
          # Stable-named alias so README/links can point at releases/latest.
          cp "Freeport_${VERSION}-offline.html" Freeport-offline.html
          gh release upload "$GITHUB_REF_NAME" "Freeport_${VERSION}-offline.html" Freeport-offline.html --clobber
          # Mirror to IPFS so the file outlives the git hosting (skips
          # gracefully when the PINATA_JWT secret is absent).
          PINATA_JWT="${{ secrets.PINATA_JWT }}" node apps/mobile/scripts/pin-ipfs.mjs Freeport-offline.html || true

      - name: Upload artifacts (dispatch validation builds)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: freeport-desktop-${{ matrix.triple }}
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/**/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/**/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/**/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/**/release/bundle/**/*.msi
          if-no-files-found: warn
