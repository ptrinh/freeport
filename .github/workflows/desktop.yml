name: Desktop

# Build the Tauri desktop app for macOS / Windows / Linux.
#  - workflow_dispatch: build all three and upload artifacts (validation).
#  - push a tag `desktop-v*`: build + attach installers to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ['desktop-v*']

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
            triple: aarch64-apple-darwin
            bun_target: bun-darwin-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
            triple: x86_64-apple-darwin
            bun_target: bun-darwin-x64
          - platform: ubuntu-22.04
            args: ''
            rust_target: x86_64-unknown-linux-gnu
            triple: x86_64-unknown-linux-gnu
            bun_target: bun-linux-x64
          - platform: windows-latest
            args: ''
            rust_target: x86_64-pc-windows-msvc
            triple: x86_64-pc-windows-msvc
            bun_target: bun-windows-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf libayatana-appindicator3-dev libxdo-dev libssl-dev build-essential file

      - name: Install deps + build workspace packages
        run: |
          npm ci
          npm ci --prefix apps/mobile
          npm run build        # compile @freeport/protocol + agent → dist (expo export needs them)
          npm --prefix apps/desktop install

      - name: Install Bun (for the notifier sidecar)
        uses: oven-sh/setup-bun@v2

      - name: Build notification-server sidecar
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          EXT=""; [ "${{ matrix.platform }}" = "windows-latest" ] && EXT=".exe"
          bun build packages/nostr-mcp/src/http.ts --compile --target=${{ matrix.bun_target }} \
            --outfile "apps/desktop/src-tauri/binaries/freeport-notifier-${{ matrix.triple }}$EXT"

      - name: Generate app icons
        working-directory: apps/desktop
        run: npx @tauri-apps/cli icon ../mobile/assets/icon.png

      - name: Build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          # Only create a release when triggered by a desktop-v* tag.
          tagName: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && 'Freeport Desktop ${{ github.ref_name }}' || '' }}
          releaseBody: 'Freeport desktop app. Download the installer for your OS below.'
          releaseDraft: true
          includeUpdaterJson: false

      - name: Upload artifacts (dispatch validation builds)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: freeport-desktop-${{ matrix.triple }}
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/**/*.dmg
            apps/desktop/src-tauri/target/**/release/bundle/**/*.AppImage
            apps/desktop/src-tauri/target/**/release/bundle/**/*.deb
            apps/desktop/src-tauri/target/**/release/bundle/**/*.exe
            apps/desktop/src-tauri/target/**/release/bundle/**/*.msi
          if-no-files-found: warn
