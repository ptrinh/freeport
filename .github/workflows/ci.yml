name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 22+: nostr-tools needs the global WebSocket, which Node 20 lacks —
          # on 20 the agent e2e's relay connections silently never open.
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json
      - name: Install workspace dependencies
        run: npm ci
      - name: Install mobile app dependencies
        run: npm ci --prefix apps/mobile
      - name: Build packages
        run: npm run build
      # Backstop for swallowed-catch / `as any` regressions (both have caused
      # real field bugs). Warnings are at ZERO — any new one fails CI. Platform
      # interop shims carry per-file justified eslint-disables instead.
      - name: Lint
        run: npm run lint
      - name: Check Breez SDK versions stay aligned (web wasm vs native)
        run: node scripts/check-breez-versions.mjs
      - name: Test (protocol, agent, freeport-self-hosted, mobile)
        run: npm test
      - name: Typecheck mobile app
        run: npx tsc --noEmit
        working-directory: apps/mobile
