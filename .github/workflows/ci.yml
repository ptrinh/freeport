name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json
      - name: Install workspace dependencies
        run: npm ci
      - name: Install mobile app dependencies
        run: npm ci --prefix apps/mobile
      - name: Build packages
        run: npm run build
      - name: Test (protocol, agent, nostr-mcp, mobile)
        run: npm test
      - name: Typecheck mobile app
        run: npx tsc --noEmit
        working-directory: apps/mobile
