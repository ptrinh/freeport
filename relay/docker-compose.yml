services:
  strfry:
    image: dockurr/strfry:latest
    container_name: freeport-relay
    restart: unless-stopped
    ports:
      - "7777:7777"
    volumes:
      - ./strfry.conf:/etc/strfry.conf:ro
      - strfry-db:/app/strfry-db
    ulimits:
      nofile:
        soft: 524288
        hard: 524288
    healthcheck:
      # NIP-11 relay info doc over plain HTTP doubles as the health endpoint.
      test: ["CMD", "wget", "-q", "-O-", "--header=Accept: application/nostr+json", "http://127.0.0.1:7777"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  strfry-db:
